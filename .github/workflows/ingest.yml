# Scheduled ingestion (docs/build-plan-slices.md Slice B)
#
# Required repository secrets:
#   DATABASE_URL          — Neon Postgres connection string
#   ANTHROPIC_API_KEY     — Claude Haiku extraction
#
# Optional repository secrets:
#   PERPLEXITY_API_KEY    — scout-sweep (skipped gracefully if missing)
#   PRODUCT_HUNT_TOKEN    — Product Hunt GraphQL (skipped if missing)
#
# Do not invent alternate secret names — operators must set the names above.

name: Ingest

on:
  schedule:
    # Daily hot sources (university/incubator news, launches)
    - cron: '0 6 * * *'
    # Weekly long-tail + domain registry (Mondays 07:00 UTC)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      cadence:
        description: 'Source cadence to ingest'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

concurrency:
  group: ingest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    name: Seed + ingest + signals
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve cadence
        id: cadence
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.cadence }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed sources
        run: node --import ./scripts/alias-register.mjs scripts/ingest/seed-sources.mjs

      - name: Run ingestion
        run: node --import ./scripts/alias-register.mjs scripts/ingest/run-ingestion.mjs --cadence=${{ steps.cadence.outputs.value }} --limit=40

      - name: Product Hunt (optional)
        if: ${{ steps.cadence.outputs.value == 'daily' }}
        run: node --import ./scripts/alias-register.mjs scripts/ingest/run-product-hunt.mjs
        continue-on-error: true

      - name: SEC Form D (optional)
        if: ${{ steps.cadence.outputs.value == 'daily' }}
        run: node --import ./scripts/alias-register.mjs scripts/ingest/run-form-d.mjs
        continue-on-error: true

      - name: Domain registry (weekly)
        if: ${{ steps.cadence.outputs.value == 'weekly' }}
        run: node --import ./scripts/alias-register.mjs scripts/ingest/run-domain-registry.mjs
        continue-on-error: true

      - name: Scout sweep (nightly)
        run: node --import ./scripts/alias-register.mjs scripts/ingest/scout-sweep.mjs
        continue-on-error: true

      - name: Index check sweep (Slice C — optional)
        run: |
          if [ -f scripts/ingest/index-check-sweep.mjs ]; then
            node --import ./scripts/alias-register.mjs scripts/ingest/index-check-sweep.mjs
          else
            echo "index-check-sweep.mjs not present yet — skipping"
          fi
        continue-on-error: true
