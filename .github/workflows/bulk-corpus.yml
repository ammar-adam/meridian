# School-aligned corpus top-up — StartupHub + registry + campus ingest.
#
# Progressive fill: below-target is OK (not a failure). Hard-fail only on missing DB.
#
# Required secrets: DATABASE_URL, STARTUPHUB_API_KEY
# Optional: ANTHROPIC_API_KEY, PERPLEXITY_API_KEY

name: Bulk corpus

on:
  schedule:
    # Nightly school-ecosystem corpus top-up (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Soft companyRecords target (reported, not a hard fail)'
        required: true
        default: '1500'
        type: string
      queries:
        description: 'StartupHub school-ecosystem queries per round'
        required: true
        default: '30'
        type: string

concurrency:
  group: bulk-corpus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fill:
    name: School corpus top-up
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      STARTUPHUB_API_KEY: ${{ secrets.STARTUPHUB_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Resolve target
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "queries=${{ github.event.inputs.queries }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=1500" >> "$GITHUB_OUTPUT"
            echo "queries=30" >> "$GITHUB_OUTPUT"
          fi

      - name: Require DATABASE_URL
        id: db
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret missing — corpus fill skipped (not a hard fail)"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Seed sources
        if: steps.db.outputs.ready == 'true'
        run: node --import ./scripts/alias-register.mjs scripts/ingest/seed-sources.mjs
        continue-on-error: true

      - name: School coverage sweep
        if: steps.db.outputs.ready == 'true'
        run: node --import ./scripts/alias-register.mjs scripts/ingest/run-school-coverage.mjs --limit=8
        continue-on-error: true

      - name: Run school-aligned corpus fill
        if: steps.db.outputs.ready == 'true'
        run: |
          node --import ./scripts/alias-register.mjs scripts/ingest/run-bulk-corpus.mjs \
            --target=${{ steps.cfg.outputs.target }} \
            --queries=${{ steps.cfg.outputs.queries }}
        continue-on-error: true

      - name: Live scrape pass (university / incubator sources)
        if: steps.db.outputs.ready == 'true'
        run: |
          node --import ./scripts/alias-register.mjs scripts/ingest/run-ingestion.mjs --cadence=daily --limit=50
        continue-on-error: true

      - name: Index check sweep
        if: steps.db.outputs.ready == 'true'
        run: node --import ./scripts/alias-register.mjs scripts/ingest/index-check-sweep.mjs --limit=40
        continue-on-error: true

      - name: Report count
        if: steps.db.outputs.ready == 'true'
        run: node --import ./scripts/alias-register.mjs scripts/ingest/report-count.mjs --target=${{ steps.cfg.outputs.target }}
        continue-on-error: true
