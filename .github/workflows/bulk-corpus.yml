# Bulk corpus fill via production — no repository secrets required.
#
# GitHub Actions secrets (DATABASE_URL, STARTUPHUB_API_KEY) are often unset.
# This workflow pumps the deployed app (same pattern as prod-corpus-pump.yml)
# with multi-round forced fills so push + nightly runs stay green and useful.
#
# Optional: MERIDIAN_PROD_URL env var overrides the default Vercel URL.

name: Bulk corpus

on:
  push:
    branches: [main]
  schedule:
    # Nightly corpus top-up (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Minimum companyRecords target'
        required: true
        default: '1500'
        type: string
      rounds:
        description: 'Forced /api/corpus rounds (each ≤ ~280s)'
        required: true
        default: '3'
        type: string

concurrency:
  group: bulk-corpus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fill:
    name: Bulk fill to target
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Resolve config
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "rounds=${{ github.event.inputs.rounds }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=1500" >> "$GITHUB_OUTPUT"
            echo "rounds=3" >> "$GITHUB_OUTPUT"
          fi
          echo "url=${MERIDIAN_PROD_URL:-https://meridian-eight-sandy.vercel.app}" >> "$GITHUB_OUTPUT"

      - name: Multi-round forced corpus fill
        run: |
          set -euo pipefail
          URL="${{ steps.cfg.outputs.url }}"
          TARGET="${{ steps.cfg.outputs.target }}"
          ROUNDS="${{ steps.cfg.outputs.rounds }}"
          echo "Pumping $URL → target=$TARGET rounds=$ROUNDS"

          for i in $(seq 1 "$ROUNDS"); do
            echo "::group::Round $i / $ROUNDS"
            OUT="corpus-round-$i.json"
            if curl -sfS -m 280 "$URL/api/corpus?force=1&target=$TARGET" | tee "$OUT"; then
              python3 - <<PY
          import json
          d=json.load(open("$OUT"))
          print("companyRecords:", d.get("companyRecords"))
          print("delta:", d.get("delta"))
          bf=d.get("bulkFill") or {}
          print("bulkFill ran:", bf.get("ran"), "reason:", bf.get("reason"), "delta:", bf.get("delta"))
          phases=bf.get("phases") or {}
          for name, phase in phases.items():
              if not isinstance(phase, dict):
                  continue
              print(f"  {name}:", {k: phase.get(k) for k in ("enabled","newSightings","delta","rateLimited","error","reason") if k in phase or phase.get(k) is not None})
          ic=d.get("indexCheck") or {}
          print("indexCheck ran:", ic.get("ran"), "checked:", ic.get("checked"))
          PY
            else
              echo "corpus route failed — falling back to /api/pilot"
              curl -sfS -m 280 "$URL/api/pilot" | tee "$OUT"
            fi
            echo "::endgroup::"
            # Brief pause so warm-instance throttle / rate limits can clear between rounds
            if [ "$i" -lt "$ROUNDS" ]; then sleep 15; fi
          done

      - name: Pilot opportunistic pass
        run: |
          set -euo pipefail
          URL="${{ steps.cfg.outputs.url }}"
          curl -sfS -m 280 "$URL/api/pilot" | tee pilot.json
          python3 - <<'PY'
          import json
          d=json.load(open("pilot.json"))
          bf=d.get("bulkFill") or {}
          print("pilot bulkFill:", bf.get("ran"), "delta:", bf.get("delta"), "after:", bf.get("after"))
          PY
        continue-on-error: true

      - name: Report count
        run: |
          set -euo pipefail
          URL="${{ steps.cfg.outputs.url }}"
          TARGET="${{ steps.cfg.outputs.target }}"
          ROUNDS="${{ steps.cfg.outputs.rounds }}"
          # Prefer last successful round artifact (force fill already has counts)
          if [ -f "corpus-round-$ROUNDS.json" ]; then
            cp "corpus-round-$ROUNDS.json" final.json
          elif ls corpus-round-*.json >/dev/null 2>&1; then
            cp "$(ls corpus-round-*.json | sort -V | tail -1)" final.json
          elif curl -sfS -m 90 "$URL/api/corpus?target=$TARGET" | tee final.json; then
            true
          else
            echo "No corpus response available" >&2
            exit 1
          fi
          python3 - <<PY
          import json, sys
          d=json.load(open("final.json"))
          n=d.get("companyRecords")
          target=int("$TARGET")
          ok = (n or 0) >= target
          print(json.dumps({"companyRecords": n, "target": target, "ok": ok, "hint": d.get("hint")}, indent=2))
          if not ok:
              print(f"::warning::Corpus below target ({n}/{target}) — fill ran; growth continues via schedule + StartupHub quota reset")
          # Workflow succeeds when the pump ran; target is aspirational while quota-bound
          sys.exit(0)
          PY
