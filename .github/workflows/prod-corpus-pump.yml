# Hit staging corpus growth endpoints — opportunistic school-aligned bulk fill.
# Soft-fail: timeouts / missing routes should not spam "runs failed".

name: Prod corpus pump

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target company record count'
        required: false
        default: '2500'

concurrency:
  group: prod-corpus-pump
  cancel-in-progress: false

jobs:
  pump:
    name: Corpus + index checks on staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Corpus bulk fill (force)
        run: |
          set +e
          URL="${MERIDIAN_STAGING_URL:-https://meridian-stg.vercel.app}"
          TARGET="${{ github.event.inputs.target || '2500' }}"
          echo "Pumping $URL/api/corpus?force=1&target=$TARGET"
          CODE=$(curl -sS -o corpus.json -w "%{http_code}" -m 280 "$URL/api/corpus?force=1&target=$TARGET")
          echo "corpus HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "corpus route unavailable — falling back to /api/pilot"
            curl -sS -m 280 -o corpus.json "$URL/api/pilot" || echo '{"ok":false}' > corpus.json
          fi
          python3 - <<'PY'
          import json
          try:
            d=json.load(open("corpus.json"))
          except Exception as e:
            print("parse error:", e)
            raise SystemExit(0)
          print("companyRecords:", d.get("companyRecords"))
          print("delta:", d.get("delta"))
          bf=d.get("bulkFill") or {}
          print("bulkFill ran:", bf.get("ran"), "reason:", bf.get("reason"), "delta:", bf.get("delta"))
          ic=d.get("indexCheck") or {}
          print("indexCheck ran:", ic.get("ran"), "checked:", ic.get("checked"))
          PY
        continue-on-error: true

      - name: Benchmark parity check
        run: |
          set +e
          URL="${MERIDIAN_STAGING_URL:-https://meridian-stg.vercel.app}"
          CODE=$(curl -sS -o benchmark.json -w "%{http_code}" -m 120 "$URL/api/benchmark")
          echo "benchmark HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::benchmark soft-fail $CODE"
            exit 0
          fi
          python3 - <<'PY'
          import json
          d=json.load(open("benchmark.json"))
          s=d.get("stats") or {}
          fp=d.get("feedParity") or {}
          fs=fp.get("feedStats") or {}
          print("ledger records:", s.get("companyRecords"))
          print("entitiesChecked:", s.get("entitiesChecked"))
          print("feedParity mandate:", fp.get("mandate"))
          print("feed total:", fs.get("total"))
          PY
        continue-on-error: true

      - name: Pilot opportunistic pass
        run: |
          set +e
          URL="${MERIDIAN_STAGING_URL:-https://meridian-stg.vercel.app}"
          curl -sS -m 280 -o pilot.json "$URL/api/pilot" || echo '{}' > pilot.json
          python3 - <<'PY'
          import json
          try:
            d=json.load(open("pilot.json"))
          except Exception:
            raise SystemExit(0)
          bf=d.get("bulkFill") or {}
          print("pilot bulkFill:", bf.get("ran"), bf.get("delta"), bf.get("after"))
          PY
        continue-on-error: true
